<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>UniSmart Complaint - Register</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body
    class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div
        class="flex flex-col lg:flex-row w-full max-w-[1200px] min-h-[700px] bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden">
        <!-- Left Side: Visual/Illustration -->
        <div class="hidden lg:flex lg:w-1/2 relative flex-col justify-between p-12 bg-primary overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-3 text-white mb-12">
                    <div class="size-8">
                        <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z"
                                fill="currentColor"></path>
                        </svg>
                    </div>
                    <span class="text-2xl font-bold tracking-tight">UniSmart Complaint</span>
                </div>
                <h1 class="text-4xl font-extrabold text-white leading-tight mb-6">Join our campus community.</h1>
                <p class="text-primary-foreground/80 text-blue-100 text-lg max-w-md">Register to make your voice heard
                    and track the resolution of your complaints.</p>
            </div>
            <!-- Abstract UI Element Decor -->
            <div class="relative z-10 bg-white/10 backdrop-blur-md rounded-xl p-6 border border-white/20">
                <div class="flex items-center gap-4 mb-4">
                    <div class="size-10 rounded-full bg-blue-400/30 flex items-center justify-center">
                        <span class="material-symbols-outlined text-white">person_add</span>
                    </div>
                    <div>
                        <div class="h-2 w-24 bg-white/40 rounded mb-2"></div>
                        <div class="h-2 w-16 bg-white/20 rounded"></div>
                    </div>
                </div>
            </div>
            <!-- Background Gradient Decorations -->
            <div class="absolute top-0 right-0 -mr-20 -mt-20 w-80 h-80 bg-blue-400/20 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-96 h-96 bg-blue-700/40 rounded-full blur-3xl"></div>
        </div>
        <!-- Right Side: Register Form -->
        <div class="flex-1 flex flex-col justify-center p-8 lg:p-16">
            <header class="mb-10 lg:hidden flex items-center gap-3">
                <div class="size-6 text-primary">
                    <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z"
                            fill="currentColor"></path>
                    </svg>
                </div>
                <h2 class="text-slate-900 dark:text-white text-lg font-bold">UniSmart</h2>
            </header>
            <div class="max-w-[400px] w-full mx-auto">
                <div class="mb-8">
                    <h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Create an Account</h2>
                    <p class="text-slate-500 dark:text-slate-400">Register as a student to submit complaints</p>
                </div>
                <form id="register-form" class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="name">Full
                            Name</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                id="name" placeholder="John Doe" type="text" required />
                        </div>
                    </div>
                    <!-- Email Input -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">University
                            Email</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                id="email" placeholder="student@university.edu" type="email" required />
                        </div>
                    </div>
                    <!-- Extra Fields -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="studentId">Student
                            ID</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">badge</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                id="studentId" placeholder="2024-XXXX" type="text" required />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300"
                            for="department">Department</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">corporate_fare</span>
                            <select
                                class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                id="department" required>
                                <option value="" disabled selected>Select Department</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Electrical Engineering">Electrical Engineering</option>
                                <option value="Business">Business</option>
                            </select>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300"
                            for="semester">Semester</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">calendar_month</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                id="semester" placeholder="e.g. 5th" type="text" required />
                        </div>
                    </div>
                    <!-- Password Input -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300"
                            for="password">Password</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
                            <input
                                class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                id="password" placeholder="••••••••" type="password" required />
                        </div>
                    </div>
                    <!-- Register Button -->
                    <button
                        class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-4"
                        type="submit">
                        <span>Register</span>
                        <span class="material-symbols-outlined text-xl">person_add</span>
                    </button>
                </form>
                <div class="mt-8 text-center">
                    <p class="text-slate-500 dark:text-slate-400 text-sm">
                        Already have an account?
                        <a class="text-primary font-bold hover:underline" href="login.html">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script src="storage.js"></script>
    <script src="auth.js"></script>
</body>

</html>
