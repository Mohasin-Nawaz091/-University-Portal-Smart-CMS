<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Assign Complaint - University CMS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
    <!-- Background Content (Admin - All Complaints View) -->
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <header
                class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-10 py-3">
                <div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
                    <div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
                        <span class="material-symbols-outlined">school</span>
                    </div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">Admin - All Complaints</h2>
                </div>
                <div class="flex flex-1 justify-end gap-4 items-center">
                    <label class="flex flex-col min-w-40 h-10 max-w-64">
                        <div class="flex w-full flex-1 items-stretch rounded-lg h-full bg-slate-100 dark:bg-slate-800">
                            <div class="text-slate-500 flex items-center justify-center pl-4">
                                <span class="material-symbols-outlined">search</span>
                            </div>
                            <input class="w-full border-none bg-transparent focus:ring-0 text-sm"
                                placeholder="Search complaints..." value="" />
                        </div>
                    </label>
                    <button class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400">
                        <span class="material-symbols-outlined">notifications</span>
                    </button>
                    <div
                        class="h-10 w-10 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
                        <span class="material-symbols-outlined text-primary">person</span>
                    </div>
                </div>
            </header>
            <main class="p-10">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-bold">Recent Complaints</h1>
                    <button class="bg-primary text-white px-4 py-2 rounded-lg font-medium">Export Report</button>
                </div>
                <div
                    class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800">
                            <tr>
                                <th class="px-6 py-4 text-sm font-semibold text-slate-600 dark:text-slate-400">ID</th>
                                <th class="px-6 py-4 text-sm font-semibold text-slate-600 dark:text-slate-400">Subject
                                </th>
                                <th class="px-6 py-4 text-sm font-semibold text-slate-600 dark:text-slate-400">Status
                                </th>
                                <th class="px-6 py-4 text-sm font-semibold text-slate-600 dark:text-slate-400">Date</th>
                                <th
                                    class="px-6 py-4 text-sm font-semibold text-slate-600 dark:text-slate-400 text-right">
                                    Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                            <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30">
                                <td class="px-6 py-4 text-sm">CMP-1024</td>
                                <td class="px-6 py-4 text-sm font-medium">Slow WiFi in Library</td>
                                <td class="px-6 py-4 text-sm"><span
                                        class="px-2 py-1 bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400 rounded-full text-xs font-bold uppercase">Pending</span>
                                </td>
                                <td class="px-6 py-4 text-sm text-slate-500">Oct 24, 2023</td>
                                <td class="px-6 py-4 text-right"><button class="text-primary font-medium text-sm">View
                                        Details</button></td>
                            </tr>
                            <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30">
                                <td class="px-6 py-4 text-sm">CMP-1023</td>
                                <td class="px-6 py-4 text-sm font-medium">Hostel Water Supply Issue</td>
                                <td class="px-6 py-4 text-sm"><span
                                        class="px-2 py-1 bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400 rounded-full text-xs font-bold uppercase">Assigned</span>
                                </td>
                                <td class="px-6 py-4 text-sm text-slate-500">Oct 23, 2023</td>
                                <td class="px-6 py-4 text-right"><button class="text-primary font-medium text-sm">View
                                        Details</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
        <!-- Modal Overlay -->
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
            <!-- Modal Window -->
            <div
                class="w-full max-w-lg bg-white dark:bg-slate-900 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
                <!-- Modal Header -->
                <div
                    class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
                    <div>
                        <h3 class="text-xl font-bold text-slate-900 dark:text-slate-100">Assign Complaint</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Case #CMP-1024: Slow WiFi in Library
                        </p>
                    </div>
                    <button class="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <!-- Modal Body -->
                <div class="p-6 space-y-5">
                    <!-- Select Department -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">corporate_fare</span>
                            Select Department
                        </label>
                        <select
                            class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary py-3 px-4 transition-all">
                            <option disabled="" selected="" value="">Select a department...</option>
                            <option value="hostel">Hostel Management</option>
                            <option selected="" value="it">IT Department</option>
                            <option value="discipline">Discipline Committee</option>
                            <option value="academic">Academic Department</option>
                            <option value="library">Library</option>
                        </select>
                    </div>
                    <!-- Priority Level -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">priority_high</span>
                            Priority Level
                        </label>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                            <button
                                class="px-3 py-2 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:border-primary transition-all">LOW</button>
                            <button
                                class="px-3 py-2 text-xs font-bold rounded-lg border-2 border-primary bg-primary/5 text-primary">MEDIUM</button>
                            <button
                                class="px-3 py-2 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:border-primary transition-all">HIGH</button>
                            <button
                                class="px-3 py-2 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:border-primary transition-all">CRITICAL</button>
                        </div>
                    </div>
                    <!-- Internal Note -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">sticky_note_2</span>
                            Internal Note
                        </label>
                        <textarea
                            class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary p-4 placeholder:text-slate-400"
                            placeholder="Add a note for the department head about this specific library connection issue..."
                            rows="4"></textarea>
                    </div>
                </div>
                <!-- Modal Footer -->
                <div
                    class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 flex items-center justify-end gap-3 border-t border-slate-100 dark:border-slate-800">
                    <button
                        onclick="window.location.href='view_complaints.html?id=' + new URLSearchParams(window.location.search).get('id')"
                        class="px-5 py-2.5 text-sm font-semibold text-primary hover:text-primary transition-colors">
                        View Thread
                    </button>
                    <button
                        class="px-5 py-2.5 text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 transition-colors">
                        Cancel
                    </button>
                    <button
                        class="px-6 py-2.5 text-sm font-semibold text-white bg-primary hover:bg-primary/90 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg">assignment_ind</span>
                        Assign Complaint
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="storage.js"></script>
    <script src="auth.js"></script>
    <script src="admin.js"></script>
</body>

</html>
